name: Manual Deploy Website (Pinned Project)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Sync website to S3
        run: |
          aws s3 sync aws-free-tier/website s3://montero-devops-portfolio-271758791081 --delete --cache-control "max-age=31536000"
          aws s3 cp aws-free-tier/website/index.html s3://montero-devops-portfolio-271758791081/index.html --cache-control "max-age=60" --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id E16FSVOSJ20B4I --paths "/*"